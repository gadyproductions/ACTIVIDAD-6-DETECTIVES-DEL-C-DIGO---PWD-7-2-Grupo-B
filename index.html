<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMC — Detectives de códigos</title>
  <link rel="stylesheet" href="./css/fondo.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <main>
    <h1>Generador de Contraseñas</h1>
    
    <div class="input-group">
      <label for="passLength">Longitud (Máximo 48):</label>
      <input type="number" id="passLength" value="12" min="4" max="48">
      <small>Solo se permiten entre 4 y 48 caracteres.</small>
    </div>

    <div class="input-group">
      <label class="checkbox-label">
        <input type="checkbox" id="includeSymbols"> 
        Incluir símbolos (!@#...)
      </label>
    </div>

    <button id="generateBtn">Generar Contraseña</button>

    <div class="result-section">
      <h3>Tu nueva contraseña:</h3>
      <input type="text" id="result" readonly placeholder="Esperando generación...">
      
      <div class="strength-container">
        <div class="strength-bar" id="strengthBar"></div>
      </div>
      <span class="strength-label" id="strengthText">Seguridad: Pendiente</span>
    </div>
  </main>

  <script src="./js/contra.js"></script>
</body>
</html>
